version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: gw
    binary: gw
    main: ./cmd/gw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64  # Intel Macを除外
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: gw
    format: tar.gz
    name_template: >-
      gw_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

brews:
  - name: gw
    repository:
      owner: jeanduplessis
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    url_template: "https://github.com/jeanduplessis/gw/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    download_strategy: CurlDownloadStrategy
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/jeanduplessis/gw"
    description: "gw - Git worktree management with automated setup and hooks"
    license: "MIT"
    skip_upload: auto
    dependencies:
      - name: git
    install: |
      bin.install "gw"

      (bash_completion/"gw").write <<~'EOS'
        # gw lazy shell-init for bash (installed via Homebrew)
        _gw_lazy_init() {
          if [[ -z "${GW_SHELL_INIT_DONE:-}" ]]; then
            local __gw_init __gw_status
            __gw_init="$(command gw shell-init bash 2>/dev/null)"
            __gw_status=$?
            if [[ $__gw_status -ne 0 || -z "$__gw_init" ]]; then
              __gw_init="$(command gw completion bash 2>/dev/null)"
              __gw_status=$?
            fi
            if [[ $__gw_status -ne 0 || -z "$__gw_init" ]]; then
              return 124
            fi

            eval "$__gw_init"
            export GW_SHELL_INIT_DONE=1
          fi

          if declare -F __gw_bash_autocomplete >/dev/null 2>&1; then
            __gw_bash_autocomplete "$@"
          elif declare -F _gw >/dev/null 2>&1; then
            _gw "$@"
          fi
        }

        complete -o bashdefault -o default -o nospace -F _gw_lazy_init gw
      EOS

      (zsh_completion/"_gw").write <<~'EOS'
        #compdef gw

        _gw_lazy_init() {
          if [[ -z ${GW_SHELL_INIT_DONE-} ]]; then
            local __gw_init __gw_status
            __gw_init="$(command gw shell-init zsh 2>/dev/null)"
            __gw_status=$?
            if [[ $__gw_status -ne 0 || -z "$__gw_init" ]]; then
              __gw_init="$(command gw completion zsh 2>/dev/null)"
              __gw_status=$?
            fi
            if [[ $__gw_status -ne 0 || -z "$__gw_init" ]]; then
              return 1
            fi

            eval "$__gw_init"
            export GW_SHELL_INIT_DONE=1
          fi

          if typeset -f _gw >/dev/null 2>&1; then
            _gw "$@"
          fi
        }

        compdef _gw_lazy_init gw
      EOS

      (fish_completion/"gw.fish").write <<~'EOS'
        function __gw_lazy_setup --on-event fish_prompt --description 'Lazy shell-init for gw (Homebrew)'
            functions -e __gw_lazy_setup

            if not set -q GW_SHELL_INIT_DONE
                command gw shell-init fish ^/dev/null | source
                set -l __gw_status $status
                if test $__gw_status -ne 0
                    command gw completion fish ^/dev/null | source
                    set __gw_status $status
                end
                if test $__gw_status -ne 0
                    return
                end

                set -gx GW_SHELL_INIT_DONE 1
            end
        end
      EOS
    test: |
      system "#{bin}/gw", "--help"

release:
  github:
    owner: jeanduplessis
    name: homebrew-tap
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"
  header: |
    ## gw {{.Version}}

    Welcome to this new release!

  footer: |
    ## Installation

    ### Homebrew
    ```bash
    brew install jeanduplessis/homebrew-tap/gw
    ```

    ### Manual Installation
    Download the appropriate binary for your platform from the assets below.

    **Full Changelog**: https://github.com/jeanduplessis/gw/compare/{{.PreviousTag}}...{{.Tag}}

nfpms:
  - id: gw
    package_name: gw
    file_name_template: >-
      gw_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    vendor: jeanduplessis
    homepage: https://github.com/jeanduplessis/gw
    maintainer: Jean du Plessis
    description: |-
      gw - Git worktree management with automated setup and hooks.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    dependencies:
      - git
    bindir: /usr/bin
